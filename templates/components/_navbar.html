<!-- Topbar -->

<header class="topbar-landing">
    <div class="container py-3">
        <div class="d-flex align-items-center justify-content-between gap-3">
            <div class="d-flex align-items-center gap-2">
                <button
                    class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center"
                    type="button"
                    id="sidebarToggle"
                    aria-label="Abrir/fechar menu"
                >
                    <i class="bi bi-list fs-4"></i>
                </button>
                <div class="brand-icon" aria-hidden="true">
                    <i class="bi bi-boxes"></i>
                </div>
                <div class="lh-sm">
                    <div class="fw-semibold title-aqua">S.G.P.</div>
                    <div class="small muted">Sistema de Gerenciamento Pessoal</div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-2">
                <a class="btn btn-sm btn-outline-primary" href="{% url 'login' %}">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Login
                </a>
                <a class="btn btn-sm btn-outline-erp" href="{% url 'register' %}">
                    <i class="bi bi-person-plus me-1"></i> Registrar
                </a>
            </div>
        </div>
    </div>
</header>

{% comment %} {% load static %}
<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark-custom">
    <!-- Navbar Brand-->
    <a class="navbar-brand ps-3" href="{% url 'dashboard' %}">
        <img src="{% static 'images/logo.png' %}" alt="logo" width="150px">
    </a>
    <!-- Sidebar Toggle-->
    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle" href="#!">
        <i class="bi bi-list h3"></i>
    </button>

    <!-- Navbar-->
    <ul class="navbar-nav ms-auto me-0 me-md-3 my-2 my-md-0">
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                <i class="bi bi-person-check h4"></i>
                <span class="h4">{{ request.user }}</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                <li>
                    <a class="dropdown-item" href="{% url 'profile' %}">
                        <i class="bi bi-person-gear"></i>
                        Perfil
                    </a>
                </li>
                <li>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-custom">
                            <i class="bi-box-arrow-right"></i>
                            Logout
                        </button>
                    </form>
                    <!-- <a class="dropdown-item" href="#!">
                        <i class="bi bi-box-arrow-right"></i>
                        Logout
                    </a> -->
                </li>
            </ul>
        </li>
    </ul>
</nav> {% endcomment %}

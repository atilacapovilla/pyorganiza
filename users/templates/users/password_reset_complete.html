{% extends 'base_home.html' %}
{% load static %}
{% block title %}PyOrganiza - Senha Alterada{% endblock title %}

{% block content %}
<div class="card shadow-sm border-0">
  <div class="card-body p-4 text-center">
    <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; height: 64px;">
      <i class="bi bi-check-circle-fill text-success fs-2"></i>
    </div>
    <h4 class="card-title mb-3">Senha Alterada com Sucesso!</h4>
    <p class="text-muted mb-4">Sua senha foi alterada. Por favor faça login novamente.</p>
    <a href="{% url 'login' %}" class="btn btn-primary">
      <i class="bi bi-box-arrow-in-right me-2"></i>Fazer Login
    </a>
  </div>
</div>
{% endblock %}
